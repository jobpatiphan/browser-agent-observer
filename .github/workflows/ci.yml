name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: pip install -r requirements-dev.txt
      - name: Compile all sources
        run: python -m compileall server.py addon.py screencast_forwarder.py common_ws.py hooks/claude_mirror.py clients/observer.py
      - name: Run tests
        run: pytest -q

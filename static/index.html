<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>browser-agent-observer</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header id="topbar">
    <span class="brand">browser-agent-observer</span>
    <span id="conn-status" class="pill pill-down">connecting…</span>
    <span id="flow-count" class="muted"></span>
  </header>

  <main id="layout">
    <section id="browser-pane">
      <h2>Browser <span id="frame-badge" class="frame-badge"></span></h2>
      <div class="pane-body" id="browser-body">
        <div id="frame-wrap">
          <img id="browser-frame" alt="waiting for browser feed…">
          <div id="cursor-overlay" class="hidden"></div>
        </div>
      </div>
      <div id="filmstrip" title="click a frame to inspect it; click ‘live’ to resume"></div>
    </section>

    <section id="traffic-pane">
      <h2>Traffic</h2>
      <div id="traffic-filters">
        <select id="filter-method">
          <option value="">method ▾</option>
          <option>GET</option><option>POST</option><option>PUT</option>
          <option>DELETE</option><option>PATCH</option><option>HEAD</option><option>OPTIONS</option>
        </select>
        <select id="filter-status">
          <option value="">status ▾</option>
          <option value="2">2xx</option><option value="3">3xx</option>
          <option value="4">4xx</option><option value="5">5xx</option>
        </select>
        <input id="filter-search" type="search" placeholder="🔍 search url / path">
      </div>
      <div class="pane-body">
        <table id="traffic-table">
          <thead>
            <tr>
              <th data-sort="method">Method</th><th>Path</th>
              <th>Status</th><th data-sort="size">Size</th>
              <th data-sort="duration_ms">Time</th>
              <th title="Security headers present / 4">Sec</th>
            </tr>
          </thead>
          <tbody id="traffic-body"></tbody>
        </table>
      </div>
    </section>

    <section id="narration-pane">
      <div class="log-tabs">
        <button class="log-tab active" data-filter="all">Activity</button>
        <button class="log-tab" data-filter="narration">Narration</button>
        <button class="log-tab" data-filter="action">Actions</button>
        <button class="log-tab" data-filter="command">Commands</button>
        <button id="export-btn" title="Download this session for replay">⤓ Export</button>
      </div>
      <div class="pane-body" id="narration-body"></div>
    </section>
  </main>

  <div id="detail-overlay" class="hidden">
    <div id="detail-panel">
      <div id="detail-header">
        <span id="detail-title"></span>
        <button id="detail-close">✕</button>
      </div>
      <div id="detail-tabs">
        <button class="detail-tab active" data-tab="request">Request</button>
        <button class="detail-tab" data-tab="response">Response</button>
        <button class="detail-tab" data-tab="cookies">Cookies</button>
        <button class="detail-tab" data-tab="timing">Timing</button>
      </div>
      <div id="detail-body">
        <pre class="detail-view" id="tab-request"></pre>
        <pre class="detail-view hidden" id="tab-response"></pre>
        <div class="detail-view hidden" id="tab-cookies"></div>
        <div class="detail-view hidden" id="tab-timing"></div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
